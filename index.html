<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSGuide</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="navbar">

        <div class="logo">
            <h1>OSGuide</h1>
        </div>

        <nav class="menu">
            <a href="#">Apps</a>
            <a href="#">Guide</a>
            <a href="#">About</a>

            <button id="theme-btn" class="theme-btn"></button>
        </nav>

    </header>

    <main>

        <section class="hero">

            <h2>Discover Trusted Android Apps</h2>

            <p>
                Browse secure and open-source Android applications.
            </p>

        </section>

        <section class="search-box">

            <input
                type="text"
                placeholder="Search applications...">

        </section>

        <section class="apps">

            <div class="app-card">

                <h3>Termux</h3>

                <p><strong>Version:</strong> 0.118</p>

                <p><strong>Size:</strong> 15 MB</p>

                <p><strong>Source:</strong> F-Droid</p>

                <button class="download-btn">
                    Download
                </button>

            </div>

        </section>

    </main>

    <footer>

        <p>© 2026 OSGuide</p>

    </footer>

    <script src="script.js"></script>

</body>

</html>
